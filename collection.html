      <div onclick="selectCategory('all')">✨ All Collections</div>

<div class="collection-gallery" id="gallery"></div></div>

<script>
    
 const firebaseConfig = {
    apiKey: "AIzaSyC6Xjlqg3wpqosotpZyPARYSzQwKLPYk_k",
    authDomain: "matek-billiards.firebaseapp.com",
    projectId: "matek-billiards",
    storageBucket: "matek-billiards.firebasestorage.app",
    messagingSenderId: "357506490776",
    appId: "1:357506490776:web:63c45761a18c015a750bed",
    measurementId: "G-QSD9334RPG"
  };


firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


loadProducts();
//---------------------------------------------------//

 function loadProducts() {

  const gallery = document.getElementById("gallery");

  db.collection("products")
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {

      gallery.innerHTML = "";

      snapshot.forEach(doc => {

        let p = doc.data();

      gallery.innerHTML += `
  <div class="item">

    <img src="${p.image}">

    <h3>${p.name}</h3>

    <p class="price">₹${p.price}</p>

    <p class="desc">${p.description || "Premium Quality Product"}</p>

    <span class="category">${p.category || "General"}</span>

    <button class="add-cart-btn" onclick="addToCart('${doc.id}')">
      Add to Cart 🛒
    </button>

  </div>
`;

      });

      // 🔥 THIS IS AFTER RENDERING
      document.querySelectorAll(".add-cart-btn").forEach(btn => {
        btn.onclick = () => {
          addToCart(btn.dataset.id);
        };
      });

    }, error => {
      console.error("Realtime error:", error);
    });

}
//------------------------------------------------------------------------------//

let allProducts = [];

function loadProducts() {

  const gallery = document.getElementById("gallery");

  db.collection("products")
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {

      allProducts = [];

      snapshot.forEach(doc => {
        let p = doc.data();
        p.id = doc.id;
        allProducts.push(p);
      });

      displayProducts(allProducts);

    });

}

//------------------------------------------------------------------------------//


function toggleDropdown() {
  document.querySelector(".dropdown").classList.toggle("active");
}

function selectCategory(category) {

  document.querySelector(".dropdown").classList.remove("active");

  let textMap = {
    all: "✨ All Collections",
    Luxury: "💎 Luxury",
    Sport: "🏎 Sport",
    Classic: "⌚ Classic"
  };

  document.getElementById("selectedCategory").innerText = textMap[category];

  // 🔥 filter products
  if (category === "all") {
    displayProducts(allProducts);
  } else {
    let filtered = allProducts.filter(p => p.category === category);
    displayProducts(filtered);
  }

}
//------------------------------------------------------------------------------//


function displayProducts(products) {

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  products.forEach(p => {

    gallery.innerHTML += `
      <div class="item">

        <img src="${p.image}">

        <h3>${p.name}</h3>

        <p class="price">₹${p.price}</p>

        <p class="desc">${p.description || ""}</p>

        <span class="category">${p.category || "General"}</span>

        <button class="add-cart-btn" onclick="addToCart('${p.id}')">
          Add to Cart 🛒
        </button>

      </div>
    `;

  });

}

//------------------------------------------------------------------------------//


function filterProducts() {

  let selected = document.getElementById("categoryFilter").value;

  if (selected === "all") {
    displayProducts(allProducts);
  } else {
    let filtered = allProducts.filter(p => p.category === selected);
    displayProducts(filtered);
  }

}

//------------------------------------------------------------------------------//
function addToCart(id) {

  const user = firebase.auth().currentUser;

  db.collection("products").doc(id).get().then(doc => {

    let p = doc.data();

    if (user) {
      // ✅ LOGGED-IN → FIREBASE

      const cartRef = db.collection("carts").doc(user.uid);

      cartRef.get().then(cartDoc => {

        let cart = cartDoc.exists ? cartDoc.data().items : [];
        if (!cart) cart = [];

        let existing = cart.find(item => item.id === id);

        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({
            id: id,
            name: p.name,
            price: Number(p.price),
            image: p.image,
            quantity: 1
          });
        }

        cartRef.set({ items: cart }).then(() => {
          alert("Added to cart 🛒");
        });

      });

    } else {
      // ✅ NOT LOGGED-IN → LOCAL STORAGE

      let cart = JSON.parse(localStorage.getItem("cart")) || [];

      let existing = cart.find(item => item.id === id);

      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({
          id: id,
          name: p.name,
          price: Number(p.price),
          image: p.image,
          quantity: 1
        });
      }

      localStorage.setItem("cart", JSON.stringify(cart));

      alert("Added to cart 🛒");
    }

  });

}
  function goHome() {
    window.location.href = "index.html";
  }

</script>
