<!DOCTYPE html>

<html>
<head>
  <title>Matek Billiards | Collection</title>
  <link rel="icon" href="./logo.jpeg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main-container">

<button onclick="goHome()" class="back-btn">⬅ Back</button>

<h1 class="collection-title">Our Collection</h1>

<!-- CATEGORY -->

<div class="filter-box">
  <div class="dropdown" id="dropdown">


<div class="dropdown-btn" onclick="toggleDropdown()">
  <span id="selectedCategory">✨ All Collections</span>
  <span class="arrow">⌄</span>
</div>

<div class="dropdown-content">
  <div onclick="selectCategory('all')">✨ All Collections</div>
  <div onclick="selectCategory('Luxury')">💎 Luxury</div>
  <div onclick="selectCategory('Sport')">🏎 Sport</div>
  <div onclick="selectCategory('Classic')">⌚ Classic</div>
</div>


  </div>
</div>

<!-- PRODUCTS -->

<div id="gallery" class="collection-gallery"></div>

</div>

<!-- IMAGE MODAL -->

<div id="imageModal" class="image-modal" onclick="outsideClick(event)">
  <span class="close-modal" onclick="closeImage()">×</span>
  <img id="modalImg">
</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "matek-billiards.firebaseapp.com",
  projectId: "matek-billiards"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allProducts = [];

/* LOAD PRODUCTS */
db.collection("products")
  .orderBy("createdAt", "desc")
  .onSnapshot(snapshot => {

    allProducts = [];

    snapshot.forEach(doc => {
      let p = doc.data();
      p.id = doc.id;
      allProducts.push(p);
    });

    renderProducts(allProducts);
  });

/* RENDER */
function renderProducts(products) {

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  if (products.length === 0) {
    gallery.innerHTML = "<p style='text-align:center;'>No products found 😔</p>";
    return;
  }

  products.forEach(p => {

    gallery.innerHTML += `
      <div class="item">

        
        <img src="${p.image}" onclick="openImage('${p.image}')">

        <h3>${p.name}</h3>

        <p class="price">₹${p.price}</p>

        <p class="desc">${p.description || "Premium Product"}</p>

        <span class="category">${p.category || "General"}</span>

        <button class="add-cart-btn" onclick="addToCart('${p.id}')">
          Add to Cart 🛒
        </button>

      </div>
    `;
  });
}

/* DROPDOWN */
function toggleDropdown() {
  document.getElementById("dropdown").classList.toggle("active");
}

function selectCategory(cat) {

  document.getElementById("dropdown").classList.remove("active");

  const names = {
    all: "✨ All Collections",
    Luxury: "💎 Luxury",
    Sport: "🏎 Sport",
    Classic: "⌚ Classic"
  };

  document.getElementById("selectedCategory").innerText = names[cat];

  if (cat === "all") {
    renderProducts(allProducts);
  } else {
    const filtered = allProducts.filter(p => p.category === cat);
    renderProducts(filtered);
  }
}

/* IMAGE MODAL */
function openImage(src) {
  document.getElementById("modalImg").src = src;
  document.getElementById("imageModal").style.display = "flex";
}

function closeImage() {
  document.getElementById("imageModal").style.display = "none";
}

function outsideClick(e) {
  if (e.target.id === "imageModal") closeImage();
}

/* ESC CLOSE */
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeImage();
});

/* CART */
function addToCart(id) {

  const user = firebase.auth().currentUser;

  db.collection("products").doc(id).get().then(doc => {

    let p = doc.data();

    if (user) {

      const cartRef = db.collection("carts").doc(user.uid);

      cartRef.get().then(cartDoc => {

        let cart = cartDoc.exists ? cartDoc.data().items : [];
        if (!cart) cart = [];

        let existing = cart.find(i => i.id === id);

        if (existing) existing.quantity++;
        else {
          cart.push({
            id,
            name: p.name,
            price: Number(p.price),
            image: p.image,
            quantity: 1
          });
        }

        cartRef.set({ items: cart });
        alert("Added to cart 🛒");
      });

    } else {

      let cart = JSON.parse(localStorage.getItem("cart")) || [];

      let existing = cart.find(i => i.id === id);

      if (existing) existing.quantity++;
      else {
        cart.push({
          id,
          name: p.name,
          price: Number(p.price),
          image: p.image,
          quantity: 1
        });
      }

      localStorage.setItem("cart", JSON.stringify(cart));
      alert("Added to cart 🛒");
    }
  });
}

/* NAV */
function goHome() {
  window.location.href = "index.html";
}
</script>
<footer class="footer">

  <div class="footer-top">
    <h2 class="footer-logo">MATEK BILLIARDS</h2>
    <p class="footer-tag">Timeless Craftsmanship</p>
  </div>

  <div class="footer-links">
    <a href="index.html">Home</a>
<a href="collection.html">Collection</a>
<a href="#" onclick="toggleCart()">Cart</a>
    <a href="orders.html">Orders</a>
  </div>

  <div class="footer-contact">
    <p>Email: matekbilliards@gmail.com</p>
    <p>
  Instagram: 
  <a href="https://www.instagram.com/matek_billiards?igsh=MnAxcDVqdTV2ZGk3" target="_blank" class="insta-link">
    📸 
  </a>
</p>
    <p>India • Luxury Timepieces</p>
  </div>

  <div class="footer-bottom">
    <p>© 2026 MATEK BILLIARDS. All rights reserved.</p>
  </div>

</footer>

</body>
</html>
