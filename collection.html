<script>
    
 const firebaseConfig = {

    measurementId: "G-QSD9334RPG"
  };


firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


loadProducts();
//---------------------------------------------------//

 function loadProducts() {

  const gallery = document.getElementById("gallery");

  db.collection("products")
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {

      gallery.innerHTML = "";

      snapshot.forEach(doc => {

        let p = doc.data();

        gallery.innerHTML += `
          <div class="item">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p class="price">₹${p.price}</p>

            <button class="add-cart-btn" data-id="${doc.id}">
              Add to Cart 🛒
            </button>
          </div>
        `;

      });

      // 🔥 THIS IS AFTER RENDERING
      document.querySelectorAll(".add-cart-btn").forEach(btn => {
        btn.onclick = () => {
          addToCart(btn.dataset.id);
        };
      });

    }, error => {
      console.error("Realtime error:", error);
    });

}
//------------------------------------------------------------------------------//
function addToCart(id) {

  const user = firebase.auth().currentUser;


  db.collection("products").doc(id).get().then(doc => {

    if (!doc.exists) {
      alert("Product not found ❌");
      return;
    }

    let p = doc.data();

    const cartRef = db.collection("carts").doc(user.uid);

    cartRef.get().then(cartDoc => {

      let cart = cartDoc.exists ? cartDoc.data().items : [];

      // 🔥 IMPORTANT: ensure array exists
      if (!cart) cart = [];

      let existing = cart.find(item => item.id === id);

      if (existing) {
        existing.quantity = (existing.quantity || 1) + 1;
      } else {
        cart.push({
          id: id,
          name: p.name,
          price: Number(p.price), // 🔥 FIXED
          image: p.image,
          quantity: 1
        });
      }

      cartRef.set({ items: cart }).then(() => {
        alert("Added to cart 🛒");
        loadCart(); // 🔥 refresh instantly
      });

    });

  }).catch(err => {
    console.error("Error:", err);
  });

}
  function goHome() {
    window.location.href = "index.html";
  }

</script>
